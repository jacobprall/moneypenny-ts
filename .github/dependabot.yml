# Keep Actions and Bun dependencies current (weekly).
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: bun
    directory: /packages/opencode-plugin
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps-plugin)"
