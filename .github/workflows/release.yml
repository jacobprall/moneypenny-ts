name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify before release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Brain - install
        run: bun install --frozen-lockfile

      - name: Brain - typecheck
        run: bun run typecheck

      - name: Brain - tests
        run: bun run test

      - name: Plugin - install, typecheck, test
        working-directory: packages/opencode-plugin
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun test

  package:
    name: Build release artifacts
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Pack plugin tarball
        working-directory: packages/opencode-plugin
        run: |
          mkdir -p ../../dist
          npm pack --pack-destination ../../dist

      - name: Archive source snapshot
        run: |
          mkdir -p dist
          tar -czf dist/moneypenny-brain-source-${GITHUB_SHA::7}.tgz \
            src scripts test package.json bun.lock tsconfig.json README.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*
          if-no-files-found: error

  github_release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  npm_publish_plugin:
    name: Publish plugin to npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install plugin deps
        working-directory: packages/opencode-plugin
        run: bun install --frozen-lockfile

      - name: Check NPM token presence
        id: token_check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN not set; skipping npm publish."
          fi

      - name: Publish plugin
        if: steps.token_check.outputs.publish == 'true'
        working-directory: packages/opencode-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
